<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KK Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    :root {
      --bg:      #111827;
      --surface: #1f2937;
      --border:  rgba(255,255,255,0.08);
      --text:    #f9fafb;
      --muted:   #9ca3af;
      --accent:  #3b82f6;
      --green:   #86efac;
      --red:     #f87171;
      --yellow:  #fde68a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 10px;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px 10px;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: .04em; }
    #clock { font-size: .8rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
    }

    /* ── Tile ── */
    .tile {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s;
    }
    .tile:hover { border-color: rgba(255,255,255,.22); }

    .tile img {
      display: block;
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: contain;
      background: #000;
    }

    .no-image {
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .85rem;
      background: #000;
    }

    /* ── Overlays ── */
    .overlays {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .overlay {
      position: absolute;
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(3px);
      pointer-events: auto;
      line-height: 1.4;
    }
    .overlay.top-right    { top: 7px; right: 7px; }
    .overlay.top-left     { top: 7px; left: 7px;  }
    .overlay.bottom-right { bottom: 36px; right: 7px; }
    .overlay.bottom-left  { bottom: 36px; left: 7px;  }

    .overlay.age  { color: var(--green); }
    .overlay.age.stale { color: var(--red); }
    .overlay.label { color: var(--yellow); }

    .overlay.marker {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 3px;
      color: #fff;
      font-size: .65rem;
      text-shadow: 0 0 4px #000;
      background: none;
      backdrop-filter: none;
    }
    .overlay.marker .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      border: 1px solid #fff;
      flex-shrink: 0;
    }
    /* Geolocation "you are here" marker — bold so it reads on any background */
    .geo-loc-marker .dot {
      width: 14px; height: 14px;
      background: #ff2d95;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,.55), 0 0 9px 2px rgba(255,45,149,.75);
    }

    /* ── Tile footer ── */
    .tile-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      min-height: 32px;
    }
    .tile-name {
      font-size: .75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
    }
    a.tile-name:hover { color: var(--text); }

    .anim-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 9px;
      border-radius: 4px;
      cursor: pointer;
      font-size: .72rem;
      flex-shrink: 0;
      margin-left: 6px;
      transition: color .15s, border-color .15s;
    }
    .anim-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Animation modal ── */
    #player-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0;
      width: min(900px, 95vw);
      max-height: 95vh;
      color: var(--text);
      overflow: hidden;
    }
    #player-modal::backdrop {
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(6px);
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    #player-title { font-size: .9rem; font-weight: 600; }

    .player-body {
      background: #000;
      display: flex;
      justify-content: center;
    }
    #player-clip {
      position: relative;
      overflow: hidden;
      line-height: 0;
      /* default: full-width contain mode */
      width: 100%;
    }
    #player-img {
      display: block;
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
    }
    #player-overlays {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    #scrubbar {
      flex: 1;
      min-width: 120px;
      -webkit-appearance: none;
      appearance: none;
      height: 22px;              /* as tall as the thumb so the track centers in it */
      background: transparent;
      cursor: pointer;
    }
    /* Larger thumb for easier grabbing on touch screens */
    #scrubbar::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,.20);
    }
    #scrubbar::-webkit-slider-thumb {
      -webkit-appearance: none;
      box-sizing: border-box;
      width: 22px; height: 22px;
      margin-top: -8px;          /* center 22px thumb on the 6px track */
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
    }
    #scrubbar::-moz-range-track {
      height: 6px; border-radius: 3px; background: rgba(255,255,255,.20);
    }
    #scrubbar::-moz-range-thumb {
      box-sizing: border-box;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
    }
    #frame-ts {
      font-size: .75rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 140px;
    }
    #fps-label { font-size: .75rem; color: var(--muted); white-space: nowrap; }
    #fps-slider { width: 70px; accent-color: var(--accent); }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      min-width: 32px; height: 32px;
      padding: 0 7px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .icon-btn:hover  { border-color: var(--accent); color: var(--accent); }

    #pause-end-select, #range-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      height: 32px;
      padding: 0 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
      flex-shrink: 0;
    }
    #pause-end-select:hover, #range-select:hover { border-color: var(--accent); }
    #pause-end-select option, #range-select option { background: var(--surface); }

    /* ── Border overlay ── */
    /* Selector must out-specify `.tile img` so the border keeps a transparent
       background — otherwise the `.tile img { background:#000 }` rule blacks
       out the satellite under this absolutely-positioned overlay. */
    .tile img.tile-border {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: contain;
      background: none;
      pointer-events: none;
    }
    .borders-off .tile-border { display: none; }

    #border-btn { font-size: .75rem; }
    #border-btn.active { color: var(--accent); border-color: var(--accent); }

    #crop-btn, #player-border-btn { font-size: .75rem; }
    #crop-btn.active, #player-border-btn.active { color: var(--accent); border-color: var(--accent); }

    #player-border {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .borders-off #player-border { display: none; }

    /* loading spinner shown while frames are fetching */
    .spinner {
      display: none;
      width: 100%;
      aspect-ratio: 4/3;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .85rem;
    }
    .spinner.active { display: flex; }
  </style>
</head>
<body>

<header>
  <h1>KK Dashboard</h1>
  <button class="icon-btn active" id="border-btn" onclick="toggleBorders()" title="Toggle border overlay">Borders</button>
  <span id="clock"></span>
</header>

<div class="grid">
  {% for tile in tiles %}
    {% with source=tile.source, has_image=tile.has_image, overlays=tile.overlays, now=tile.now, roi_crop=tile.roi_crop, thumb_border_url=tile.thumb_border_url %}
      {% include "tile.html" %}
    {% endwith %}
  {% endfor %}
</div>

<!-- ── Animation player modal ── -->
<dialog id="player-modal">
  <div class="player-header">
    <span id="player-title"></span>
    <button class="icon-btn" onclick="closePlayer()" title="Close (Esc)">✕</button>
  </div>
  <div class="player-body">
    <div class="spinner" id="player-spinner">loading frames…</div>
    <div id="player-clip">
      <img id="player-img" src="" alt="" style="display:none">
      <img id="player-border" src="" alt="" aria-hidden="true" style="display:none">
      <div id="player-overlays" class="overlays">
        <div id="player-geo-marker" class="overlay marker geo-loc-marker" style="display:none"><span class="dot"></span></div>
      </div>
    </div>
  </div>
  <div class="player-controls">
    <button class="icon-btn" id="play-pause-btn" onclick="togglePlay()" title="Space">▶</button>
    <button class="icon-btn active" id="crop-btn" onclick="toggleCrop()" style="display:none" title="Toggle crop / full frame">Crop</button>
    <button class="icon-btn active" id="player-border-btn" onclick="toggleBorders()" style="display:none" title="Toggle border overlay">Borders</button>
    <select id="range-select" onchange="setRange(this.value)" title="Time range to animate">
      <option value="1">1 h</option>
      <option value="3" selected>3 h</option>
      <option value="6">6 h</option>
      <option value="12">12 h</option>
      <option value="24">24 h</option>
      <option value="0">all</option>
    </select>
    <select id="pause-end-select" onchange="setPauseEnd(this.value)" title="Pause at latest frame">
      <option value="0">loop</option>
      <option value="100">hold 0.1s</option>
      <option value="200">hold 0.2s</option>
      <option value="500">hold 0.5s</option>
      <option value="1000">hold 1s</option>
    </select>
    <input type="range" id="scrubbar" min="0" value="0"
           oninput="scrub(this.value)" onchange="scrub(this.value)">
    <span id="frame-ts">—</span>
    <label id="fps-label">
      <input type="range" id="fps-slider" min="1" max="24" value="8"
             oninput="setFps(this.value)"> <span id="fps-val">8</span> fps
    </label>
  </div>
</dialog>

<script>
  // ── Clock ──
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toUTCString().replace('GMT', 'UTC');
  }
  tick();
  setInterval(tick, 1000);

  // ── Live image-age badges ──
  // Server renders an initial value; the browser updates it every second from
  // data-mtime. <1 min: seconds, 1-5 min: M:SS, then rounded to whole minutes.
  function _fmtAge(sec) {
    if (sec < 0) sec = 0;
    if (sec < 60)    return Math.floor(sec) + 's ago';
    if (sec < 300)   { const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
                       return m + ':' + String(s).padStart(2, '0') + ' ago'; }
    if (sec < 3600)  return Math.floor(sec / 60) + ' min ago';
    if (sec < 86400) return Math.floor(sec / 3600) + ' h ago';
    return Math.floor(sec / 86400) + ' d ago';
  }
  function updateAges() {
    const now = Date.now() / 1000;
    document.querySelectorAll('.overlay.age[data-mtime]').forEach(el => {
      const sec = now - parseFloat(el.dataset.mtime);
      el.textContent = _fmtAge(sec);
      const sa = parseFloat(el.dataset.staleAfter);
      if (!isNaN(sa)) el.classList.toggle('stale', sec > sa);
    });
  }
  setInterval(updateAges, 1000);
  updateAges();

  // ── Border toggle (shared by header + player buttons) ──
  function toggleBorders() {
    const off = document.body.classList.toggle('borders-off');
    document.getElementById('border-btn').classList.toggle('active', !off);
    document.getElementById('player-border-btn').classList.toggle('active', !off);
    // Re-apply inside the player if it's open (inline display overrides CSS)
    if (document.getElementById('player-modal').open && pCurrentSourceId) {
      const src = pCropMode ? _thumbBorderSrc(pCurrentSourceId)
                            : _fullBorderSrc(pCurrentSourceId);
      _showPlayerBorder(src);
    }
  }

  // ── Player state ──
  let pFrames = [];
  let pIndex  = 0;
  let pPlaying = false;
  let pTimer  = null;
  let pFps    = 8;
  let pPauseEndMs = 0;
  let pAtEndHold  = false;
  let pRoi    = null;
  let pCropMode = true;
  let pCurrentSourceId = null;
  let pRangeHours = 3;   // time window to animate (0 = all archived)

  // Border is shown unless the global "Borders" toggle is off.
  function _showPlayerBorder(src) {
    const b = document.getElementById('player-border');
    const off = document.body.classList.contains('borders-off');
    b.src = src || '';
    b.style.display = (src && !off) ? 'block' : 'none';
  }

  function _applyPlayerCrop(roi, thumbBorderSrc) {
    const clip = document.getElementById('player-clip');
    const img  = document.getElementById('player-img');
    const modal = document.getElementById('player-modal');
    const maxW = modal.offsetWidth - 28;
    const scale = Math.min(1, maxW / roi.w);
    clip.style.width    = (roi.w * scale) + 'px';
    clip.style.height   = (roi.h * scale) + 'px';
    img.style.position  = 'absolute';
    img.style.width     = (roi.fullW * scale) + 'px';
    img.style.height    = (roi.fullH * scale) + 'px';
    img.style.left      = -(roi.x * scale) + 'px';
    img.style.top       = -(roi.y * scale) + 'px';
    img.style.maxHeight = 'none';
    img.style.objectFit = 'fill';
    // Border PNG covers the same ROI extent → fills the clip exactly.
    _showPlayerBorder(thumbBorderSrc);
  }

  function _applyPlayerFull(fullBorderSrc) {
    const clip = document.getElementById('player-clip');
    const img  = document.getElementById('player-img');
    clip.style.width    = '100%';
    clip.style.height   = '';
    img.style.position  = '';
    img.style.width     = '100%';
    img.style.height    = 'auto';
    img.style.left      = '';
    img.style.top       = '';
    img.style.maxHeight = '70vh';
    img.style.objectFit = 'contain';
    _showPlayerBorder(fullBorderSrc);
  }

  function _fullBorderSrc(sourceId) {
    const tileEl = document.querySelector(`[data-source="${sourceId}"]`);
    return tileEl ? (tileEl.dataset.fullBorder || null) : null;
  }

  function _thumbBorderSrc(sourceId) {
    const tileEl = document.querySelector(`[data-source="${sourceId}"]`);
    return tileEl ? (tileEl.dataset.thumbBorder || null) : null;
  }

  function toggleCrop() {
    pCropMode = !pCropMode;
    document.getElementById('crop-btn').classList.toggle('active', pCropMode);
    if (pCropMode && pRoi) {
      _applyPlayerCrop(pRoi, _thumbBorderSrc(pCurrentSourceId));
    } else {
      _applyPlayerFull(_fullBorderSrc(pCurrentSourceId));
    }
    placePlayerMarker();
  }

  async function openPlayer(sourceId, name) {
    const modal   = document.getElementById('player-modal');
    const spinner = document.getElementById('player-spinner');
    const img     = document.getElementById('player-img');
    const cropBtn = document.getElementById('crop-btn');

    document.getElementById('player-title').textContent = name;
    pCurrentSourceId = sourceId;

    const tileEl = document.querySelector(`[data-source="${sourceId}"]`);
    pRoi = tileEl && tileEl.dataset.roi ? JSON.parse(tileEl.dataset.roi) : null;
    pCropMode = !!pRoi;

    spinner.classList.add('active');
    img.style.display = 'none';
    modal.showModal();

    if (pRoi) {
      _applyPlayerCrop(pRoi, _thumbBorderSrc(sourceId));
      cropBtn.style.display = '';
      cropBtn.classList.toggle('active', true);
    } else {
      _applyPlayerFull(_fullBorderSrc(sourceId));
      cropBtn.style.display = 'none';
    }

    // Border toggle button — only when this source has a border overlay
    const borderBtn = document.getElementById('player-border-btn');
    const hasBorder = !!(_thumbBorderSrc(sourceId) || _fullBorderSrc(sourceId));
    borderBtn.style.display = hasBorder ? '' : 'none';
    borderBtn.classList.toggle('active', !document.body.classList.contains('borders-off'));

    await loadFrames();
  }

  // Fetch + preload frames for the current source/range, then start playback.
  async function loadFrames() {
    if (!pCurrentSourceId) return;
    const spinner = document.getElementById('player-spinner');
    const img     = document.getElementById('player-img');
    stopPlay();
    spinner.textContent = 'loading frames…';
    spinner.classList.add('active');
    img.style.display = 'none';

    try {
      const resp = await fetch(`/api/frames/${pCurrentSourceId}?hours=${pRangeHours}`);
      const data = await resp.json();
      pFrames = data.frames;
    } catch(e) {
      spinner.textContent = 'Failed to load frames.';
      return;
    }

    spinner.classList.remove('active');
    if (pFrames.length === 0) {
      spinner.textContent = 'No frames in this range.';
      spinner.classList.add('active');
      return;
    }

    img.style.display = 'block';

    // preload all frames
    pFrames.forEach(f => { const i = new Image(); i.src = f.url; });

    const scrubbar = document.getElementById('scrubbar');
    scrubbar.max = pFrames.length - 1;
    pIndex = 0;
    updateFrame();
    startPlay();
    placePlayerMarker();
  }

  function setRange(val) {
    pRangeHours = parseFloat(val);
    loadFrames();
  }

  function closePlayer() {
    stopPlay();
    document.getElementById('player-modal').close();
    _applyPlayerFull(null);
    const cropBtn = document.getElementById('crop-btn');
    cropBtn.style.display = 'none';
    cropBtn.classList.remove('active');
    document.getElementById('player-geo-marker').style.display = 'none';
    pRoi = null; pCurrentSourceId = null; pCropMode = true;
    pFrames = [];
  }

  function updateFrame() {
    if (!pFrames.length) return;
    const f = pFrames[pIndex];
    document.getElementById('player-img').src = f.url;
    document.getElementById('scrubbar').value = pIndex;
    document.getElementById('frame-ts').textContent = f.ts;
  }

  function startPlay() {
    pPlaying = true;
    pAtEndHold = false;
    document.getElementById('play-pause-btn').textContent = '⏸';
    if (pTimer) clearInterval(pTimer);
    pTimer = setInterval(() => {
      if (pAtEndHold) return;
      pIndex = (pIndex + 1) % pFrames.length;
      updateFrame();
      if (pPauseEndMs > 0 && pIndex === pFrames.length - 1) {
        pAtEndHold = true;
        setTimeout(() => { pAtEndHold = false; }, pPauseEndMs);
      }
    }, 1000 / pFps);
  }

  function stopPlay() {
    pPlaying = false;
    pAtEndHold = false;
    document.getElementById('play-pause-btn').textContent = '▶';
    if (pTimer) { clearInterval(pTimer); pTimer = null; }
  }

  function setPauseEnd(val) {
    pPauseEndMs = parseInt(val);
  }

  function togglePlay() { pPlaying ? stopPlay() : startPlay(); }

  function scrub(val) {
    stopPlay();            // moving the slider pauses; resumes only on play
    pIndex = parseInt(val);
    updateFrame();
  }

  function setFps(val) {
    pFps = parseInt(val);
    document.getElementById('fps-val').textContent = val;
    if (pPlaying) startPlay();
  }

  // Close modal when clicking the backdrop (outside the dialog content)
  document.getElementById('player-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closePlayer();
  });

  // ── Geolocation marker ──
  // Placed on every tile that has data-n/s/e/w (i.e. geo_bounds in source config).
  // Accounts for object-fit:contain pillarboxing so the dot lands on the image pixels.
  let _geoLat = null, _geoLon = null;

  function _renderedImageRect(imgEl) {
    const el = imgEl.getBoundingClientRect();
    const nr = imgEl.naturalWidth / imgEl.naturalHeight;
    const er = el.width / el.height;
    if (nr > er) {
      // image wider than container — letterbox top/bottom
      const h = el.width / nr;
      return { l: el.left, t: el.top + (el.height - h) / 2, w: el.width, h };
    } else {
      // image narrower than container — pillarbox left/right
      const w = el.height * nr;
      return { l: el.left + (el.width - w) / 2, t: el.top, w, h: el.height };
    }
  }

  // Web Mercator y (matches image_utils.merc_y on the server)
  function _mercY(latDeg) {
    return Math.log(Math.tan(Math.PI / 4 + (latDeg * Math.PI / 180) / 2));
  }

  function placeGeoMarkers(root) {
    if (_geoLat === null) return;
    (root || document).querySelectorAll('.geo-loc-marker').forEach(m => {
      const n = +m.dataset.n, s = +m.dataset.s;
      const w = +m.dataset.w, e = +m.dataset.e;
      if (_geoLat < s || _geoLat > n || _geoLon < w || _geoLon > e) return;
      const tile = m.closest('.tile');
      if (!tile) return;   // skip the player marker (handled by placePlayerMarker)
      const imgEl = tile.querySelector('img');
      if (!imgEl || !imgEl.naturalWidth) {
        imgEl?.addEventListener('load', () => placeGeoMarkers(tile), { once: true });
        return;
      }
      // Fraction within the FULL image — longitude linear, latitude in Mercator y
      const mN = _mercY(n), mS = _mercY(s);
      let fx = (_geoLon - w) / (e - w);
      let fy = (mN - _mercY(_geoLat)) / (mN - mS);
      // The grid thumbnail may be an ROI crop of the full image — remap into it
      const roi = tile.dataset.roi ? JSON.parse(tile.dataset.roi) : null;
      if (roi) {
        fx = (fx * roi.fullW - roi.x) / roi.w;
        fy = (fy * roi.fullH - roi.y) / roi.h;
        if (fx < 0 || fx > 1 || fy < 0 || fy > 1) { m.style.display = 'none'; return; }
      }
      const ir  = _renderedImageRect(imgEl);
      const ovr = m.parentElement.getBoundingClientRect();
      m.style.left    = (ir.l - ovr.left) + fx * ir.w + 'px';
      m.style.top     = (ir.t - ovr.top)  + fy * ir.h + 'px';
      m.style.display = '';
    });
  }

  // Marker inside the animation player — handles both crop and full-frame modes.
  function placePlayerMarker() {
    const marker = document.getElementById('player-geo-marker');
    if (_geoLat === null || !pCurrentSourceId) { marker.style.display = 'none'; return; }
    const tileEl = document.querySelector(`[data-source="${pCurrentSourceId}"]`);
    const gm = tileEl ? tileEl.querySelector('.geo-loc-marker') : null;
    if (!gm) { marker.style.display = 'none'; return; }   // source has no geo_bounds
    const n = +gm.dataset.n, s = +gm.dataset.s, w = +gm.dataset.w, e = +gm.dataset.e;
    if (_geoLat < s || _geoLat > n || _geoLon < w || _geoLon > e) { marker.style.display = 'none'; return; }

    const img = document.getElementById('player-img');
    if (!img.naturalWidth) { img.addEventListener('load', placePlayerMarker, { once: true }); return; }

    const mN = _mercY(n), mS = _mercY(s);
    const fxFull = (_geoLon - w) / (e - w);
    const fyFull = (mN - _mercY(_geoLat)) / (mN - mS);

    let xPx, yPx;
    if (pCropMode && pRoi) {
      // img is the full frame, scaled and offset; clip shows the ROI crop
      const clip = document.getElementById('player-clip').getBoundingClientRect();
      const scale = clip.width / pRoi.w;
      xPx = (fxFull * pRoi.fullW - pRoi.x) * scale;
      yPx = (fyFull * pRoi.fullH - pRoi.y) * scale;
      if (xPx < 0 || xPx > clip.width || yPx < 0 || yPx > clip.height) {
        marker.style.display = 'none'; return;
      }
    } else {
      // full-frame mode: img is object-fit:contain within its box
      const ir  = _renderedImageRect(img);
      const ovr = document.getElementById('player-overlays').getBoundingClientRect();
      xPx = (ir.l - ovr.left) + fxFull * ir.w;
      yPx = (ir.t - ovr.top)  + fyFull * ir.h;
    }
    marker.style.left = xPx + 'px';
    marker.style.top  = yPx + 'px';
    marker.style.display = '';
  }

  // Fallback to Komakallio (the ROI centre) when the browser has no geolocation
  // or denies/times out — so the marker is still visible for reference.
  const _FALLBACK_LAT = 60.17, _FALLBACK_LON = 24.39;   // Komakallio
  function _useFallbackLocation() {
    if (_geoLat !== null) return;   // a real fix already arrived
    _geoLat = _FALLBACK_LAT; _geoLon = _FALLBACK_LON;
    placeGeoMarkers();
    placePlayerMarker();
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => { _geoLat = pos.coords.latitude; _geoLon = pos.coords.longitude; placeGeoMarkers(); placePlayerMarker(); },
      _useFallbackLocation,    // permission denied / unavailable / timeout
      { maximumAge: 300_000, timeout: 10_000 }
    );
  } else {
    _useFallbackLocation();    // browser has no geolocation API at all
  }

  // Re-place markers and refresh age badges after HTMX tile swaps
  document.addEventListener('htmx:afterSwap', () => { placeGeoMarkers(); updateAges(); });

  // Re-place markers on resize (layout-dependent positions)
  window.addEventListener('resize', () => { placeGeoMarkers(); placePlayerMarker(); });

  // SSE — update tiles instantly when fetcher saves a new image
  // Wrapped in DOMContentLoaded so htmx (defer) is guaranteed loaded first
  document.addEventListener('DOMContentLoaded', () => {
    const sse = new EventSource('/api/events');
    sse.onmessage = e => {
      const sourceId = e.data.trim();
      const tile = document.querySelector(`[data-source="${sourceId}"]`);
      if (tile) htmx.ajax('GET', `/tile/${sourceId}`, {target: tile, swap: 'outerHTML'});
    };
    // EventSource reconnects automatically on error — nothing to do here
  });

  // keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (!document.getElementById('player-modal').open) return;
    if (e.key === 'Escape')      { closePlayer(); return; }
    if (e.key === ' ')           { e.preventDefault(); togglePlay(); return; }
    if (e.key === 'ArrowRight')  { e.preventDefault(); pIndex = Math.min(pIndex+1, pFrames.length-1); updateFrame(); }
    if (e.key === 'ArrowLeft')   { e.preventDefault(); pIndex = Math.max(pIndex-1, 0); updateFrame(); }
  });
</script>
</body>
</html>
