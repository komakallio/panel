# Add / remove sources here — no Python needed for standard http_image sources.
# type: http_image   — fetch a URL, archive, serve.
# type: generated    — run a Python function to produce the image.
# type: custom       — custom fetch logic in custom_sources/<module>.py
#
# interval:   seconds between fetches
# retention:  hours to keep archived frames
# thumbnail:  resize to fit within w×h (keeps aspect ratio, no crop)
# overlays:   rendered in browser, nothing burned into the image file
#   - type: age           — "3 min ago" badge, turns red when stale
#   - type: label         — static text label
#   - type: marker        — lat/lon dot (requires geo_bounds on the source)
# geo_bounds: enables lat/lon → pixel mapping for marker overlays

sources:

  - id: kk_allsky
    name: "Komakallio Allsky"
    type: http_image
    url: "https://taivas.komakallio.fi/images/latest.jpg"
    # Real-time updates arrive via the server's WebSocket push; the poll is just
    # a slow fallback for when the socket is down.
    interval: 300
    push_ws: "wss://taivas.komakallio.fi/ws"
    retention: 72
    thumbnail:
      width: 640
      height: 640
    link: "https://taivas.komakallio.fi"
    overlays:
      - type: label
        text: "KK Allsky"
      - type: age
        stale_after: 600

  # Sun & moon altitude / twilight chart — self-hosted copy of
  # vostok.kapsi.fi/twilight.html, rendered client-side in an embed (iframe) tile.
  - id: twilight
    name: "Sun & Moon — Komakallio"
    type: embed
    url: "/widgets/twilight.html"
    link: "https://vostok.kapsi.fi/twilight.html"

  - id: metsahovi
    name: "Metsahovi Allsky"
    type: http_image
    url: "https://data.metsahovi.fi/allsky/latest_hf.jpeg"
    interval: 300
    retention: 72
    thumbnail:
      width: 640
      height: 480
    link: "https://data.metsahovi.fi/allsky/"
    overlays:
      - type: label
        text: "Metsahovi"
      - type: age
        stale_after: 900

  # ── Tampereen Ursa sky cameras (ursa.fi/yhd/tampereenursa) ──────────────────
  # Four fixed cameras looking N/E/S/W from the Tampere observatory. Plain JPEG
  # snapshots served with ETag + Last-Modified, so the HEAD probe skips
  # unchanged downloads. 16:9 views, no map projection → thumbnail, no ROI crop.
  - id: tampere_north
    name: "Tampere North"
    type: http_image
    url: "https://www.ursa.fi/yhd/tampereenursa/ys-images/north-snapshot.jpg"
    interval: 15      # cameras update every 60s; oversample so no frame is missed (HEAD probe skips unchanged)
    retention: 72
    thumbnail:
      width: 640
      height: 360
    link: "https://www.ursa.fi/yhd/tampereenursa/"
    overlays:
      - type: label
        text: "Tampere N"
      - type: age
        stale_after: 900

  - id: tampere_east
    name: "Tampere East"
    type: http_image
    url: "https://www.ursa.fi/yhd/tampereenursa/ys-images/east-snapshot.jpg"
    interval: 15
    retention: 72
    thumbnail:
      width: 640
      height: 360
    link: "https://www.ursa.fi/yhd/tampereenursa/"
    overlays:
      - type: label
        text: "Tampere E"
      - type: age
        stale_after: 900

  - id: tampere_south
    name: "Tampere South"
    type: http_image
    url: "https://www.ursa.fi/yhd/tampereenursa/ys-images/south-snapshot.jpg"
    interval: 15
    retention: 72
    thumbnail:
      width: 640
      height: 360
    link: "https://www.ursa.fi/yhd/tampereenursa/"
    overlays:
      - type: label
        text: "Tampere S"
      - type: age
        stale_after: 900

  - id: tampere_west
    name: "Tampere West"
    type: http_image
    url: "https://www.ursa.fi/yhd/tampereenursa/ys-images/west-snapshot.jpg"
    interval: 15
    retention: 72
    thumbnail:
      width: 640
      height: 360
    link: "https://www.ursa.fi/yhd/tampereenursa/"
    overlays:
      - type: label
        text: "Tampere W"
      - type: age
        stale_after: 900

  # ── Sat24 Finland ─────────────────────────────────────────────────────────
  # All four sources share a single sat24.com page fetch (cached 90s).
  # Images are composite tiles from imn-rust-lb.infoplaza.io at zoom 6.
  #
  # Tile extent: zoom 6, x=[33,40), y=[14,20) → exact tile-derived bounds:
  #   west=5.625°E  east=45.0°E  north=70.6126°N  south=55.7766°N
  #   image 1792×1536 px (7×6 tiles at 256 px each), center 25.3125°E 64.1681°N
  # Border overlay uses maptiler zoom 5 (their static API uses 512px tiles, so
  # their zoom = slippy/256px zoom − 1). Verified pixel-aligned 2026-06-20.

  - id: sat24_vis
    name: "Sat24 Visible"
    type: custom
    module: sat24
    sat24_layer: euVisible
    interval: 300
    retention: 72
    link: "https://www.sat24.com/en-gb/country/fi"
    border_url: "https://maptiler.infoplaza.io/api/maps/Border/static/25.3125,64.1681,5/1792x1536.png?attribution=false"
    geo_bounds:
      north: 70.6126
      south: 55.7766
      west: 5.625
      east: 45.0
    overlays:
      - type: label
        text: "Sat24 VIS"
      - type: age
        stale_after: 1200

  - id: sat24_ir
    name: "Sat24 Infrared"
    type: custom
    module: sat24
    sat24_layer: euInfra
    interval: 300
    retention: 72
    link: "https://www.sat24.com/en-gb/country/fi"
    border_url: "https://maptiler.infoplaza.io/api/maps/Border/static/25.3125,64.1681,5/1792x1536.png?attribution=false"
    geo_bounds:
      north: 70.6126
      south: 55.7766
      west: 5.625
      east: 45.0
    overlays:
      - type: label
        text: "Sat24 IR"
      - type: age
        stale_after: 1200

  - id: sat24_micro
    name: "Sat24 Night Microphysics"
    type: custom
    module: sat24
    sat24_layer: euMicro
    interval: 300
    retention: 72
    link: "https://www.sat24.com/en-gb/country/fi"
    border_url: "https://maptiler.infoplaza.io/api/maps/Border/static/25.3125,64.1681,5/1792x1536.png?attribution=false"
    geo_bounds:
      north: 70.6126
      south: 55.7766
      west: 5.625
      east: 45.0
    overlays:
      - type: label
        text: "Sat24 Micro"
      - type: age
        stale_after: 1200

  - id: sat24_radar
    name: "Sat24 Radar+Sat"
    type: custom
    module: sat24
    sat24_layer: euRadarSat
    interval: 300
    retention: 72
    link: "https://www.sat24.com/en-gb/country/fi"
    border_url: "https://maptiler.infoplaza.io/api/maps/Border/static/25.3125,64.1681,5/1792x1536.png?attribution=false"
    geo_bounds:
      north: 70.6126
      south: 55.7766
      west: 5.625
      east: 45.0
    overlays:
      - type: label
        text: "Sat24 Radar+Sat"
      - type: age
        stale_after: 1200

  # ── Helsinki Testbed (testbed.fmi.fi) ───────────────────────────────────────
  # The viewer page lists its last n frames as time-encoded img.php URLs paired
  # with UTC timestamps, so custom_sources/testbed.py scrapes the page each fetch
  # and backfills any frame it's missing (n=15 → up to ~75 min of recovery).
  # Georeferenced in EPSG:3067 (see proj_bounds below).
  - id: testbed_radar
    name: "Helsinki Testbed Radar"
    type: custom
    module: testbed
    page_url: "https://testbed.fmi.fi/?imgtype=radar&t=5&n=15"
    interval: 30      # cheap: only downloads frames not already archived (~1 per 5 min)
    retention: 72
    thumbnail:
      width: 640
      height: 640
    link: "https://testbed.fmi.fi/?imgtype=radar&t=5&n=15"
    # EPSG:3067 (ETRS-TM35FIN) extent of the 600x508 raster, from click
    # calibration; used browser-side (TM35FIN forward in JS) to place the
    # location marker. Shown full-frame, so no ROI crop.
    proj_bounds:
      epsg: 3067
      min_e: 262834
      max_e: 487686
      min_n: 6580827
      max_n: 6765012
    overlays:
      - type: label
        text: "Testbed Radar"
      - type: age
        stale_after: 1800

